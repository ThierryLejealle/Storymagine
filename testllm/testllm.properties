# Bench
bench.runs=3
bench.maxModelSizeGo=25
bench.outputDir=bench

# Ollama
ollama.url=http://localhost:11434
ollama.contextWindow=32768
ollama.maxContextWindow=131072
ollama.topK=40
ollama.topP=0.9
ollama.repeatPenalty=1.1
ollama.numPredict=-1
ollama.retryCount=5
ollama.retryDelay1=15
ollama.retryDelay2=30
ollama.retryDelay3Plus=60

# Mode d'appel Ollama : stream (recommande) ou sync
ollama.mode=stream

# Timeouts mode stream
ollama.stream.firstTokenTimeoutMs=300000
ollama.stream.interTokenTimeoutMs=30000

# Timeouts mode sync (si ollama.mode=sync)
ollama.timeoutMs=600000
ollama.largeModelRamFractionPct=60
ollama.largeModelTimeoutMultiplier=3
