title: "Jour 8 — La Chute"
type: imperative

description: >
  La dernière mission de Pierre Moreau. Au-dessus de la Normandie, la Jagdgeschwader
  de Wolf croise l'escadrille. Pierre fait son travail. Wolf fait le sien.

goal: >
  Clore le roman sur une ambiguïté irrésolue : Pierre disparaît dans la mer.
  Le lecteur ne doit PAS savoir si c'est un choix délibéré ou une impossibilité physique.
  L'ambiguïté EST la résolution — ne pas la lever, ne pas la commenter.

defaults:
  character_sheets: ["pierre_moreau", "oberleutnant_wolf"]
  focus: ["CIEL", "MACHINE", "PEUR", "MORT"]

sequences:

  - type: explicit
    directive: >
      Le briefing est court. Vol d'escorte vers les plages. Météo dégagée.
      Pas de questions. Jules touche l'hélice de la main droite.

  - type: explicit
    directive: >
      Au-dessus de la côte normande, le premier échelon ennemi arrive de l'est.
      Pierre engage. Il est à son niveau. Un adversaire ennemi, un combat aérien expert.

  - type: explicit
    directive: >
      Pierre tient. Deux adversaires en moins de trois minutes.
      Un troisième passage, plus risqué.
      Puis le ciel se vide d'un coup. Trop vite. Pierre le sent avant de le voir.
    focus: ["MACHINE", "PEUR", "MORT"]

  - type: explicit
    directive: >
      L'Oberleutnant Wolf choisit sa cible. Une passe. Pierre ne l'a
      pas vu venir — personne ne voit Wolf venir. Le Spitfire se met à brûler.
    character_sheets: ["pierre_moreau", "oberleutnant_wolf"]
    focus: ["CIEL", "MACHINE", "MORT"]

  - type: explicit
    directive: >
      Le Spitfire tombe vers la Manche. Pierre ne tente pas de s'éjecter.
      Peut-être qu'il ne peut plus. Peut-être qu'il a décidé quelque chose
      dans ces dernières secondes. On ne saura pas. La mer est froide en juin.
    requirements:
      - "| Pierre ne tente pas de s'éjecter — ce fait est explicitement présent"
      - "| La mer froide en juin est mentionnée"
      - "| Aucune explication sur le choix final de Pierre — l'ambiguïté est maintenue jusqu'à la fin"
      - "| Aucun dialogue, aucune pensée explicite de Pierre dans cette dernière séquence"
