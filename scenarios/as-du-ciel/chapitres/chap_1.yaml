title: "Jour 1 — Thorney Island"
type: imperative

description: >
  Pierre Moreau arrive à la base de Thorney Island le 6 juin 1944, au lendemain du
  Débarquement. L'escadrille est en alerte maximale. Il rencontre Bertrand, Jules,
  et son Spitfire pour la première fois.

goal: >
  Installer Pierre comme un étranger dans un groupe soudé depuis des mois.
  Le lecteur doit ressentir son isolement : il observe, il ne participe pas encore,
  il ne comprend pas les codes tacites. Pas de chaleur, pas d'intégration.

defaults:
  character_sheets: ["pierre_moreau", "commandant_bertrand", "jules_meca"]
  focus: ["CIEL", "MACHINE", "CAMARADERIE"]

sequences:

  - type: explicit
    directive: >
      Pierre arrive à la base à l'aube du 6 juin. Le bruit des moteurs Merlin
      résonne au loin. Sur le tarmac, les Spitfires sont alignés dans la brume,
      hélices immobiles. Il pose son sac et regarde le ciel.
    requirements:
      - "| Pierre est décrit comme observateur passif — il regarde, il ne touche pas encore"
      - "| L'escadrille est présente mais distante, Pierre n'est pas intégré dans le groupe"
      - "| Le Spitfire est nommé 'Grey Ghost' ou 'Spitfire' — jamais un autre nom"

  - type: explicit
    directive: >
      Le commandant Bertrand reçoit Pierre dans son bureau. Deux minutes.
      Peu de mots. Le poids du commandement dans chaque silence. Pierre repart avec
      son numéro de machine et une seule phrase : demain, à l'aube.
    character_sheets: ["pierre_moreau", "commandant_bertrand"]
    focus: ["CAMARADERIE"]
    # Requirement "contrainte | check" : la contrainte cadre le planner/writer, le check vérifie le résultat.
    requirements:
      plan:
        - "La rencontre Bertrand–Pierre ne dépasse pas une séquence courte — ne pas développer une conversation. | Le plan prévoit-il une scène courte, sans dialogue prolongé ?"
      writer:
        - "Bertrand ne sourit pas, ne tutoie pas, ne donne aucun conseil personnel à Pierre. | Bertrand reste froid et autoritaire — aucune chaleur humaine, aucun encouragement"
        - "Pierre ne pose pas de questions — il écoute et repart. | Pierre repart avec uniquement son numéro de machine, rien de plus"
        - "| La scène dure deux minutes maximum dans le récit — pas de longue conversation"

  - type: explicit
    directive: >
      Jules le mécanicien présente le Spitfire à Pierre pour la première fois.
      Il lui explique ses habitudes, ses caprices, ses rituels de maintenance.
    character_sheets: ["jules_meca"]

  - type: explicit
    directive: >
      La première nuit à la base. Pierre ne dort pas.
      Un moment de vie ordinaire parmi les pilotes dans le dortoir ou la salle commune.
      Avant l'aube, il retourne sur le tarmac et pose la main sur le fuselage du
      Grey Ghost. Le métal est froid. Le ciel commence à blanchir à l'est.
    focus: ["CAMARADERIE", "PEUR", "CIEL"]
