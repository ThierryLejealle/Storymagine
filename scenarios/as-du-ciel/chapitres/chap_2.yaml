title: "Jour 5 — L'Escorte et le Mess"
type: imperative

description: >
  Mission d'escorte d'un Hurricane endommagé, puis soirée cartes dans le mess.
  Deux couleurs opposées de la guerre dans le même jour.

goal: >
  Montrer deux couleurs opposées de la guerre : la tension asymétrique de l'escorte
  (protéger un appareil plus faible) et l'absurde ordinaire de la détente entre pilotes.
  Les deux séquences doivent résonner l'une avec l'autre — le silence du jeu de cartes
  répond à la concentration muette du vol d'escorte.

defaults:
  character_sheets: ["pierre_moreau", "henri_leclair", "jules_meca"]
  focus: ["CIEL", "MACHINE", "CAMARADERIE"]
  lore: |
    [HURRICANE]
    Le Hawker Hurricane a une aile épaisse et bombée, un fuselage arrondi, une cabine haut perchée.
    Plus lent et moins nerveux que le Spitfire, mais robuste — il encaisse mieux les dommages.
    Son moteur Merlin est le même, mais l'appareil répond moins vite aux commandes, moins à l'aise dans les angles serrés.

sequences:

  - type: explicit
    directive: >
      Mission improvisée : un Hurricane de la RAF, moteur touché, ne peut plus manœuvrer.
      Pierre est désigné pour l'escorter jusqu'à la côte. Trente minutes à coller
      à un appareil plus lent, à surveiller tous les quadrants, à résister à l'envie
      de dégager et de se battre. L'appareil est lent, contraint, vulnérable —
      Pierre ne peut pas manœuvrer librement tant qu'il protège le Hurricane.
    character_sheets: ["pierre_moreau"]
    focus: ["CIEL", "MACHINE"]
    checks:
      - "Les contraintes de vol liées au Hurricane sont présentes : lenteur, impossibilité de manœuvrer librement"
      - "Pierre est décrit comme contraint par l'appareil à protéger, pas comme chasseur libre"
      - "La tension vient de l'attente et de la surveillance, pas d'un combat actif"

  - type: explicit
    directive: >
      Le soir. La salle commune du mess. Jules a sorti un jeu de cartes. Henri bluffe
      avec trop de régularité. Pierre regarde plus qu'il ne joue. Quelqu'un met de la
      musique sur la radio. Personne ne parle de demain.
      Chaque personnage joue comme il pilote — les gestes révèlent ce que les mots cachent.
    checks:
      - "Chaque personnage joue ou se comporte de façon distincte — pas un groupe homogène"
      - "L'atmosphère est détendue en surface mais chargée en sous-texte"
      - "Aucune mention explicite du lendemain ni de la mort — le non-dit porte tout"
