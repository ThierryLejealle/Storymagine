# Parametres moteur du Redacteur — Storymagine

# --- Critique du plan ---
# Nombre maximum de replanifications par chapitre.
# Declenchement : des qu'un critique emet au moins une remarque (AMELIORATION, DEFAUT_SIGNIFICATIF ou DEFAUT_MAJEUR).
# A la fin de toutes les passes, le plan avec la meilleure note moyenne est retenu.
critique.plan.max_retry=3

# --- Critique du chapitre (texte final) ---
# Seuil de declenchement d'une reecriture complete du chapitre (toutes les sequences).
# La reecriture est declenchee si le score moyen des critiques est <= ce seuil (echelle 0.0-10.0).
# Le plan est reutilise — seul le Writer est relance avec les problemes identifies.
critique.chapitre.threshold=7.0

# Nombre maximum de reecritures completes du chapitre.
critique.chapitre.max_retry=3

# --- Verification par sequence ---
# Nombre maximum de retentatives par sequence pour chaque verificateur independant :
#   - DeusInMachinaChecker (fuite mecanique detectee)
#   - SequenceStyleChecker  (score < style_threshold)
#   - SequenceChecker       (elements requis manquants)
# Chaque verificateur gere sa propre boucle — une sequence peut etre reecrite jusqu'a 3 fois
# (une fois par verificateur, si les trois echouent tous).
critique.sequence.max_retry=1
