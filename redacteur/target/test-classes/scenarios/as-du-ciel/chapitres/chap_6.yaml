title: "Jour 7 — La Dernière Soirée"
type: imperative

description: >
  Une soirée calme. Personne ne parle de demain. Jules inspecte le Grey Ghost une
  dernière fois, sans le savoir. Pierre écrit une lettre à Lucie. La radio joue
  du jazz dans la salle commune. Chaque détail ordinaire pèse d'un poids inédit.

goal: >
  Suspendre le lecteur entre la joie ordinaire de la camaraderie et un pressentiment
  diffus du danger. Personne ne parle de demain — mais tout le détail ordinaire doit
  peser d'un poids inédit. L'émotion vient des objets et des gestes, pas des mots.

defaults:
  character_sheets: ["pierre_moreau", "jules_meca", "henri_leclair"]
  focus: ["CAMARADERIE", "MORT", "MACHINE"]

sequences:

  - type: explicit
    directive: >
      Une soirée calme. Personne ne parle de demain. Jules inspecte le Grey Ghost une
      dernière fois, sans le savoir. Pierre écrit une lettre à Lucie. La radio joue
      du jazz dans la salle commune. Chaque détail ordinaire pèse d'un poids inédit.
    min_words: 600
