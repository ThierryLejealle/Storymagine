# Ollama
ollama.base-url=http://localhost:11434
ollama.context-window=32768
ollama.max-context-window=131072
ollama.top-k=40
ollama.top-p=0.9
ollama.repeat-penalty=1.1
ollama.num-predict=-1
ollama.retry-count=5
ollama.retry-delay1=15
ollama.retry-delay2=30
ollama.retry-delay3=60

# Mode d'appel Ollama : stream (recommande) ou sync
ollama.mode=stream

# Timeouts mode stream
ollama.stream.first-token-timeout-ms=300000
ollama.stream.inter-token-timeout-ms=30000

# Timeouts mode sync (si ollama.mode=sync)
ollama.timeout-ms=600000
ollama.large-model-ram-fraction-pct=60
ollama.large-model-timeout-multiplier=3

# Repertoire des scenarios
scenario.root.default=C:\\dev\\llm\\story

# Parametres de generation
sequence.default.words=300
beats.base=2
beats.per.words.ratio=75
beats.tolerance.pct=20

# Seuil de re-correction — mode FULL uniquement (runsCorrectorsRepeat)
# Relance un correcteur si (corrections/mot > threshold.per.word) OU (corrections >= min.corrections)
# Ex : 0.016 = 8 corrections pour 500 mots
corrector.repeat.threshold.per.word=0.016
corrector.repeat.min.corrections=7
corrector.repeat.max.passes=3
