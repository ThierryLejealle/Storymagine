# Ollama
ollama.base-url=http://localhost:11434
ollama.context-window=32768
ollama.max-context-window=131072
ollama.top-k=40
ollama.top-p=0.9
ollama.repeat-penalty=1.1
ollama.num-predict=-1
ollama.timeout-ms=600000
ollama.large-model-ram-fraction-pct=60
ollama.large-model-timeout-multiplier=3
ollama.retry-count=5
ollama.retry-delay1=15
ollama.retry-delay2=30
ollama.retry-delay3=60

# Parametres de generation
sequence.default.words=300
beats.base=2
beats.per.words.ratio=75
beats.tolerance.pct=20
