title: "Jour 6 — La Décision"
type: imperative

description: >
  Mission d'escorte vers Caen. Henri est touché lors d'une attaque surprise.
  Pierre rompt la formation pour le couvrir. Henri rentre. Pierre rentre.
  Le commandant attend sur le tarmac.

goal: >
  Point de bascule moral : montrer que le lien humain entre Pierre et Henri devient
  plus fort que la discipline militaire. La décision doit être rapide, irréfléchie,
  viscérale — pas héroïque. Pas de justification longue. Juste un choix instinctif.

defaults:
  character_sheets: ["pierre_moreau", "henri_leclair", "commandant_bertrand", "jules_meca"]
  focus: ["PEUR", "CAMARADERIE", "MACHINE"]
  lore: |
    [MITCHELL]
    Le B-25 Mitchell est un bombardier moyen américain, biréacteur, ventre plat et ailes droites.
    Sa double dérive verticale est caractéristique — on le reconnaît de loin.
    Les deux Wright Cyclone produisent un grondement sourd et régulier, très différent du Merlin ; en formation serrée, la vibration se sent dans les commandes du chasseur d'escorte.

sequences:

  - type: explicit
    directive: >
      Le briefing du matin. Escorte de Mitchells vers Caen. Les Allemands ont renforcé
      la zone. Bertrand montre les axes sur la carte. Sa voix ne monte jamais.

  # TEST directives-imperatives — contrainte atmosphérique impérative dans la directive
  - type: explicit
    directive: >
      Au-dessus de Caen, une attaque surprise par-dessus les nuages.
      Henri est touché au premier passage et perd de l'altitude.
      Un adversaire ennemi engage Pierre dans la foulée.
      Il est midi — le soleil est au zénith. La lumière aveugle par instants, venant de face.
      Ce détail du soleil est impératif : il doit être présent et sensible dans la scène.
    checks:
      - "Le soleil au zénith ou midi est explicitement présent dans la scène"
      - "L'éblouissement ou la lumière frontale affecte Pierre pendant le combat"

  - type: explicit
    directive: >
      Pierre voit Henri piquer. Il a deux secondes pour décider.
      Il rompt la formation. Il descend vers son équipier. La radio hurle son nom.
      La mort récente de Martin — son ailier des premières semaines — ressurgit
      comme un réflexe viscéral : Pierre agit plus vite que d'habitude, moins calculé,
      prend plus de risques que son profil habituel ne le laisserait croire.
    character_sheets: ["pierre_moreau", "henri_leclair"]
    focus: ["PEUR", "CAMARADERIE"]
    checks:
      - "La décision de Pierre prend deux secondes — pas de délibération longue"
      - "La rupture de formation est explicite : Pierre désobéit à l'ordre tactique"
      - "La radio hurle le nom de Pierre — ce détail concret est présent"

  - type: explicit
    directive: >
      Pierre ramène Henri à la base.
      Jules est sur le tarmac, inspecte l'appareil d'Henri en silence.
      Bertrand attend, les mains dans le dos.
      Deux minutes de silence. Puis une phrase. Puis rien.
    character_sheets: ["pierre_moreau", "commandant_bertrand", "jules_meca"]
    focus: ["CAMARADERIE", "MORT"]
