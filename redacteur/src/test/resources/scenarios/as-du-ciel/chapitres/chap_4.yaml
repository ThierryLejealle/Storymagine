# TEST interlude — scène du côté allemand, le soir de la Décision (Jour 6)
# Illustre : type interlude, perspective, timeline, bridge_back

title: "Jour 6 — L'Autre Côté du Ciel"
type: interlude

perspective: "Du côté allemand — Jagdgeschwader de Wolf, base de Caen"
timeline: "simultané"

bridge_back: >
  Retour sur Pierre et l'escadrille britannique sans mentionner l'Oberleutnant Wolf
  ni les Allemands explicitement. Le lecteur porte seul la tension de ce qu'il vient d'apprendre.
  Recommencer la trame principale comme si l'interlude n'avait pas eu lieu.

description: >
  Le même soir. Dans un hangar de fortune près de Caen, l'Oberleutnant Wolf
  fait son rapport à son commandant. Un Spitfire lui a échappé aujourd'hui —
  un pilote qu'il n'avait pas vu venir de cette façon. Il le note. Il s'en souvient.

defaults:
  character_sheets: ["oberleutnant_wolf"]
  focus: ["CIEL", "MACHINE"]

sequences:

  - type: explicit
    directive: >
      Le hangar de fortune. Lumières tamisées, odeur d'huile et de terre mouillée.
      Wolf rédige son rapport à la lueur d'une lampe à huile. La radio grésille en fond.
      Il note les coordonnées, les temps de réaction, les sorties ennemies.
      Sa main s'arrête sur un nom : Spitfire MkIX, immatriculation inconnue. Il a rompu
      la formation pour couvrir son ailier. Wolf note cela aussi.
    checks:
      - "Wolf est du côté allemand — pas de perspective britannique dans cette séquence"
      - "L'action de Pierre (rupture de formation) est notée mais pas nommée explicitement"
      - "L'atmosphère est sobre et professionnelle — pas de diabolisation ni de sentimentalisme"

  - type: explicit
    directive: >
      Wolf pose le stylo. Dehors, le bruit d'un moteur qui refroidit. Son ailier de ce matin
      ne rentrera pas. Wolf ne le mentionne pas dans le rapport — ce n'est pas son rôle.
      Mais avant d'éteindre la lampe, il relit la dernière ligne : pilote adverse — tactique
      inhabituelle — à surveiller. Puis il éteint.
    checks:
      - "La scène se termine sur un état stable — Wolf range son rapport et passe à autre chose"
      - "Pas de cliffhanger ouvert qui empêcherait la trame principale de reprendre"
