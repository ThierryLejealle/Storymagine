# Ollama
ollama.base-url=http://localhost:11434
ollama.context-window=65536
ollama.max-context-window=131072
ollama.top-k=40
ollama.top-p=0.9
ollama.repeat-penalty=1.1
# Plafond de generation par defaut (en tokens) : filet de securite si le modele ne rencontre jamais
# sa stop sequence (voir RoleplayNarrator.STOP_SEQUENCES). Releve de 600 a 1200 (2026-07-13) : des
# reponses etaient parfois tronquees en cours de phrase avec 600, trop juste pour un tour a
# plusieurs paragraphes d'action+dialogue, surtout en francais (plus de tokens/mot qu'en anglais).
# Reglable dans l'UI par session (panneau reglages, voir GenerationSettings) sans toucher ce defaut.
ollama.num-predict=1200
ollama.retry-count=5
ollama.retry-delay1=15
ollama.retry-delay2=30
ollama.retry-delay3=60

# Mode d'appel Ollama : stream (recommande) ou sync — s'applique a tous les appels du module
# (roleplay et ChatSummarizer utilisent tous les deux ModelCallPort, /api/chat).
ollama.mode=stream

# Timeouts mode stream
ollama.stream.first-token-timeout-ms=300000
ollama.stream.inter-token-timeout-ms=30000

# Timeouts mode sync (si ollama.mode=sync)
ollama.timeout-ms=600000
ollama.large-model-ram-fraction-pct=60
ollama.large-model-timeout-multiplier=3

# Repertoire des chatscenarios — vide = repertoire du projet (chatscenarios/), jamais un chemin
# externe par defaut (voir CLAUDE.md : Claude n'a pas le droit d'acceder a du contenu hors projet).
chatscenarios.root.default=

# Port du serveur web local
chat.web.port=8765
